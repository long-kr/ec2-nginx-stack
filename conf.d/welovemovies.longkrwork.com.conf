server {
    listen 80;
    server_name welovemovies.longkrwork.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 "nginx is working\n";
    }
}

server {
    listen 443 ssl;
    server_name welovemovies.longkrwork.com;

    ssl_certificate /etc/letsencrypt/live/welovemovies.longkrwork.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/welovemovies.longkrwork.com/privkey.pem;

    location / {
        proxy_pass http://we-love-movies-app:5000;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}