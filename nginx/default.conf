server {
    listen 80;
    server_name welovemovies.longkrwork.com;
    # return 301 https://$host$request_uri;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # location / {
    #     return 301 https://$host$request_uri;
    # }

    location / {
        return 200 "nginx is working\n";
    }
}

