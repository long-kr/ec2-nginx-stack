server {
    listen 80;
    server_name welovemovies.longwork.com;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name restaurant.longwork.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name welovemovies.longwork.com;

    ssl_certificate /etc/nginx/certs/welovemovies/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/welovemovies/privkey.pem;

    location / {
        proxy_pass http://we-love-movies-app:5000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name restaurant.longwork.com;

    ssl_certificate /etc/nginx/certs/restaurant/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/restaurant/privkey.pem;

    location / {
        proxy_pass http://restaurant-app:5001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}